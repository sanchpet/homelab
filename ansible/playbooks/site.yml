---
# Main run (key-based): baseline + hardening on ALL hosts, then k3s.
#   ansible-playbook playbooks/site.yml

- name: Baseline + hardening (all infra servers)
  hosts: all
  become: true
  roles:
    - common
    - hardening

# k3s — official k3s.orchestration collection (community-first, see CLAUDE.md).
# Takes hosts from the server/agent groups; config comes from inventory vars
# (server_config_yaml).
- name: Install k3s cluster
  ansible.builtin.import_playbook: k3s.orchestration.site
