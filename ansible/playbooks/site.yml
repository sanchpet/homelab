---
# Основной прогон (по ключу): baseline + харднинг на ВСЕ хосты, затем k3s на узлы кластера.
#   ansible-playbook playbooks/site.yml

- name: Baseline + hardening (все серверы инфры)
  hosts: all
  become: true
  roles:
    - common
    - hardening

- name: Install k3s (узлы кластера)
  hosts: vps_stand
  become: true
  roles:
    - k3s
