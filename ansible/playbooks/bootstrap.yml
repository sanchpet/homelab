---
# Day-0: make a fresh host manageable. Run once, while password auth is still active:
#   ansible-galaxy install -r ../requirements.yml
#   ansible-playbook playbooks/bootstrap.yml --ask-pass --ask-become-pass
# Afterwards access is key-based; run site.yml without --ask-pass.
- name: Day-0 bootstrap (make hosts manageable)
  hosts: all
  become: true
  roles:
    - bootstrap
