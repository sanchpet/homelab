# Admin user the bootstrap role creates (parameterized so the role stays generic).
bootstrap_admin_user: sanchpet

# Operator's public SSH key — installed for the admin user. A public key is not a
# secret, so it lives here in the clear.
ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAII4Ekg6KZNE4QcW8gfgKVC824nLDLBALRkZmuyByDbtg sanchpet@mac-air"
