# Topology only — variables live in group_vars/ and host_vars/.
# Copy to hosts.ini and set the real ansible_host (the IP is not a secret).
# Groups follow the k3s.orchestration convention (k3s_cluster → server/agent).
[server]
vps-stand ansible_host=REPLACE_WITH_IP

[agent]

[k3s_cluster:children]
server
agent
