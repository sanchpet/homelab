# Скопируй в hosts.ini и подставь реальные значения.
# IP не секрет (он и так в Shodan/CT-логах). НО пароли сюда НЕ писать —
# используй --ask-pass / --ask-become-pass или ansible-vault.
[vps_stand]
vps-stand ansible_host=REPLACE_WITH_IP

[vps_stand:vars]
ansible_user=root
# Публичный SSH-ключ, который роль bootstrap зальёт и после этого отключит пароль.
# Раскомментируй и вставь свой:
# ssh_public_key="ssh-ed25519 AAAA... you@host"
