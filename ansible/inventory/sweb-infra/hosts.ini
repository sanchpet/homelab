# sweb-infra — the RU infra hub: a 3-node k3s stacked-HA cluster on SpaceWeb (SYS-001 ADR-0005).
# Topology only — variables live in group_vars/. ansible_host is a DNS name (public, not a
# secret); the IP can change behind it. Groups follow the k3s.orchestration convention.
#
# All three nodes are `server` → stacked HA (embedded etcd, quorum 3, tolerate -1). The
# collection cluster-inits the first server and joins the rest (a shared token is REQUIRED —
# see group_vars/k3s_cluster.yml).
#
# ⚠️ OWNER: create the A-records first (step 1.2) and confirm these names. infra-01 already
# exists (petrovpet2_vps_10, 168.222.202.148); infra-02/03 are created by `terragrunt apply`
# (node_count=3). Adjust the DNS names below to your chosen scheme if different.
[server]
infra-01 ansible_host=infra-01.sweb.sanch.pet
infra-02 ansible_host=infra-02.sweb.sanch.pet
infra-03 ansible_host=infra-03.sweb.sanch.pet

[agent]

[k3s_cluster:children]
server
agent
