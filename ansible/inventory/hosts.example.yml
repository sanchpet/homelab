---
# Copy to hosts.yml and fill in the values. The IP is not a secret (Shodan/CT logs).
# Structure follows the k3s.orchestration collection convention (k3s_cluster → server/agent).
k3s_cluster:
  children:
    server:
      hosts:
        vps-stand:
          ansible_host: REPLACE_WITH_IP
    agent:
      hosts: {}

  vars:
    ansible_user: root

    # Public SSH key for the bootstrap role (it uploads the key, then disables passwords):
    # ssh_public_key: "ssh-ed25519 AAAA... you@host"

    # k3s version — bump to a recent stable (https://github.com/k3s-io/k3s/releases).
    k3s_version: v1.33.4+k3s1
    api_endpoint: "{{ hostvars[groups['server'][0]]['ansible_host'] }}"

    # token intentionally omitted: a single server auto-generates one. For multi-node,
    # set token: "{{ ... }}" (openssl rand -base64 64) under ansible-vault.

    # Server config (/etc/rancher/k3s/config.yaml): disable Traefik (ingress comes from
    # the GitOps catalog), make the kubeconfig world-readable.
    server_config_yaml: |
      disable:
        - traefik
      write-kubeconfig-mode: "0644"
