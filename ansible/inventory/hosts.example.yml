---
# Topology only — variables live in group_vars/ and host_vars/ (not inline here).
# Copy to hosts.yml and set the real ansible_host.
# Structure follows the k3s.orchestration collection convention (k3s_cluster → server/agent).
k3s_cluster:
  children:
    server:
      hosts:
        vps-stand:
          ansible_host: REPLACE_WITH_IP
    agent:
      hosts: {}
