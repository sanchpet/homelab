---
# Baseline для всех хостов. Домен тривиальный → свои таски (community-роль избыточна).
# Точки подключения community при росте: geerlingguy.ntp/swap и т.п.
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Get current timezone
  ansible.builtin.command: timedatectl show -p Timezone --value
  register: common_current_tz
  changed_when: false

- name: Set timezone
  ansible.builtin.command: "timedatectl set-timezone {{ common_timezone }}"
  when: common_current_tz.stdout != common_timezone
  changed_when: true
