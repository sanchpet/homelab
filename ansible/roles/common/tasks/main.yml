---
# Baseline for all hosts. Trivial domain → own tasks (a community role is overkill).
# Community hook points as this grows: geerlingguy.ntp/swap, etc.
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Get current timezone
  ansible.builtin.command: timedatectl show -p Timezone --value
  register: common_current_tz
  changed_when: false

- name: Set timezone
  ansible.builtin.command: "timedatectl set-timezone {{ common_timezone }}"
  when: common_current_tz.stdout != common_timezone
  changed_when: true
