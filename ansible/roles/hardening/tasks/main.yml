---
# Community as the base (devsec.hardening — CIS/NSA, battle-tested) + own extensions.
# This is the reference for the project's community-first principle (see CLAUDE.md).

- name: OS hardening (devsec) with an override for k8s/VPN
  ansible.builtin.import_role:
    name: devsec.hardening.os_hardening
  vars:
    # CRITICAL: k3s and anylink (VPN) require IP forwarding; devsec disables it by
    # default → override it, otherwise cluster networking and the tunnel break.
    sysctl_overwrite:
      net.ipv4.ip_forward: 1
      net.ipv6.conf.all.forwarding: 1

- name: SSH hardening (devsec)
  ansible.builtin.import_role:
    name: devsec.hardening.ssh_hardening
  vars:
    ssh_server_ports: ['22']
    ssh_allow_tcp_forwarding: 'yes'

# --- Own extensions on top of the community base ---
- name: Install fail2ban (own extension)
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
