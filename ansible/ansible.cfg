[defaults]
# No default inventory: each cluster is its own inventory dir, pass it explicitly with
# `-i inventory/<cluster>/` (multi-cluster — see README).
roles_path = roles
# Fleet-wide connection user. Populates {{ ansible_user }} for all plays (including the
# imported k3s.orchestration roles, which use it for kubectl setup). Day-0 bootstrap
# overrides with `-u root`. Override per-cluster via group_vars/ if a cluster differs.
remote_user = sanchpet
host_key_checking = False
retry_files_enabled = False
# YAML-formatted task output via the builtin default callback. (The old
# `stdout_callback = yaml` pointed at community.general.yaml, removed in 12.0.0.)
result_format = yaml
interpreter_python = auto_silent

[privilege_escalation]
become = True
