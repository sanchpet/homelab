# Ansible toolchain (Layer 1). Merged with the repo-root mise.toml when you cd here:
# root provides the cluster binaries (sops, age, kubectl, flux), this adds Python.
[tools]
python = "3.12"
uv = "latest"

[env]
# uv-managed venv, scoped to this layer (ansible/.venv), auto-created on entry.
_.python.venv = { path = ".venv", create = true }

[tasks.deps]
description = "Install Python deps (uv) and Ansible collections"
run = [
  "uv sync",
  "ansible-galaxy install -r requirements.yml",
]
