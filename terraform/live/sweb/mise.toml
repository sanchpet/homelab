# Scoped config for the SpaceWeb units: auto-inject a provider token under this dir,
# analogous to YC_TOKEN via direnv. Merges with the repo-root mise.toml.
#
# One-time setup on the machine: `sweb configure` (stores login+password+token in the OS
# keyring, or a 0600 file). After that, entering this dir mints a fresh SWEB_TOKEN and the
# terraform provider authenticates with no credentials in the environment.

[tools]
# Our SpaceWeb CLI, installed from GitHub releases (prebuilt binary, no Go needed).
"github:sanchpet/sweb" = "0.3.0"

[env]
# Mint a fresh token on each activation (`sweb token`). On failure (sweb not configured
# yet) this yields an empty value rather than erroring — the provider then reports missing
# credentials only when you actually run terragrunt, not on every `cd`.
SWEB_TOKEN = "{{ exec(command='sweb token 2>/dev/null || true') }}"
