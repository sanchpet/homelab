# Terraform/OpenTofu tooling, scoped to terraform/ (merged with the repo-root mise.toml
# when you cd into terraform/, same pattern as ansible/mise.toml).
#
# OpenTofu (not Terraform): drop-in CLI, MPL-2.0 license. Pinned — the repo principle is
# "pin the version" for standard-domain tools. 1.12.x is required for S3-native state
# locking (`use_lockfile`, see live/root.hcl) — no DynamoDB table needed on Yandex S3.
[tools]
opentofu  = "1.12.2"
terragrunt = "1.0.8"

[env]
# Terragrunt shells out to `terraform` by default; point it at the OpenTofu binary.
# TG_TF_PATH is the current (terragrunt >= 0.73) variable; TERRAGRUNT_TFPATH is the
# deprecated alias, kept for belt-and-suspenders across versions.
TG_TF_PATH = "tofu"
TERRAGRUNT_TFPATH = "tofu"
