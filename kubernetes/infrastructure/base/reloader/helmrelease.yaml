---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 1h
  chart:
    spec:
      chart: reloader
      version: "2.2.12"
      sourceRef:
        kind: HelmRepository
        name: stakater
        namespace: reloader
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    reloader:
      # Only act on workloads that opt in via the reloader.stakater.com/* annotation.
      watchGlobally: true
      reloadStrategy: annotations
