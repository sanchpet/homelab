---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-gateway-fabric
  namespace: nginx-gateway
spec:
  interval: 1h
  chart:
    spec:
      chart: nginx-gateway-fabric
      version: "2.6.3"
      sourceRef:
        kind: HelmRepository
        name: nginx-gateway-fabric
        namespace: nginx-gateway
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  # No Gateway resource here → NGF control plane only, no data plane / no :443
  # listener yet → does not conflict with the xray Reality inbound on hostPort 443.
