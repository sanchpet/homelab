---
# Shared cluster gateway (NGF). HTTP:80 for ACME HTTP-01 + HTTPS:8443 for the sub
# endpoint. xray Reality keeps hostPort 443 — different ports, no conflict.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: sub-https
      port: 8443
      protocol: HTTPS
      hostname: sub.vps.ger.ips.sanch.pet
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: sub-vps-ger-tls
      allowedRoutes:
        namespaces:
          from: All
