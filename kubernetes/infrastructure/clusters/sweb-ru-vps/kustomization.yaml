---
# Layer 3 — per-cluster configs (Gateway + its certs + letsencrypt ClusterIssuers).
# An `infra-configs` Flux Kustomization (dependsOn infra-controllers) applies these, so the
# CRDs + cert-manager are already present.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gateway
components:
  - ../../components/letsencrypt
