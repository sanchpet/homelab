---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/clusters/ips-ger-vps-2/apps
  prune: true
  wait: true
  # No decryption: this cluster IS the secret store — its apps carry no SOPS files, so it
  # must not depend on the sops-age key (unlike the VPN nodes whose gost creds are SOPS).
  # Secrets here land via Vault/ESO, not SOPS.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
