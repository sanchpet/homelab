---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/clusters/ips-ger-vps-2/apps
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age   # age key, created out-of-band in flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
