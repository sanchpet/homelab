---
# ResourceSet wrapping the Flux Operator's own HelmRelease — makes the OPERATOR
# GitOps-self-managed (ADR-0002, full pattern per the Flux blog / d2-fleet reference).
# Terraform installs the operator ONCE at bootstrap (same chart + values); Flux then adopts
# and reconciles it from here, so operator upgrades are a git edit, not a `terraform apply`.
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  dependsOn:
    # The ResourceSet creates a HelmRelease → wait for the helm-controller CRD (installed by
    # the FluxInstance) before applying.
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: helmreleases.helm.toolkit.fluxcd.io
  resources:
    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: flux-operator
        namespace: flux-system
      spec:
        interval: 10m
        url: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
        ref:
          semver: '*' # TODO pin a specific version per ADR-0001 (never float)
        # Supply-chain: verify the chart is cosign-signed by ControlPlane's release workflow.
        verify:
          provider: cosign
          matchOIDCIdentity:
            - issuer: ^https://token\.actions\.githubusercontent\.com$
              subject: ^https://github\.com/controlplaneio-fluxcd/charts/\.github/workflows/release\.yml@refs/tags/v\d+\.\d+\.\d+$
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: flux-operator
        namespace: flux-system
      spec:
        interval: 30m
        releaseName: flux-operator
        serviceAccountName: flux-operator
        chartRef:
          kind: OCIRepository
          name: flux-operator
        install:
          strategy:
            name: RetryOnFailure
            retryInterval: 3m
        upgrade:
          force: true
          strategy:
            name: RetryOnFailure
            retryInterval: 3m
        valuesFrom:
          - kind: ConfigMap
            name: flux-operator-values
            valuesKey: values.yaml
