---
# Explicit root kustomization for this cluster's Flux entrypoint (ADR-0001).
# WITHOUT it, Flux auto-generates one via `kustomize create --autodetect --recursive`,
# which descends into infra/ and apps/ and applies the layer manifests RAW at the root —
# no postBuild substitution, no ordering. List ONLY the Flux Kustomization CRs +
# cluster-vars; the layer dirs are reached via each KS's own path.
# No committed `flux-system/`: Flux is seeded by the Flux Operator + a FluxInstance whose
# sync creates the `flux-system` GitRepository + root Kustomization (ADR-0002).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - cluster-vars.yaml
  - infra-crds.yaml
  - infra-controllers.yaml
  - infra-configs.yaml
  - apps.yaml
