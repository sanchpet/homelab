---
# Routes the sub hostname (TLS-terminated at the Gateway on :8443) to the 3x-ui sub
# server. Cross-namespace to the Gateway (nginx-gateway), allowed by the Gateway's
# allowedRoutes.from: All. Backend xui-sub is in the same ns (vpn) → no ReferenceGrant.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: xui-sub
  namespace: vpn
spec:
  parentRefs:
    - name: main
      namespace: nginx-gateway
      sectionName: sub-https
  hostnames:
    - sub.${cluster_subdomain}
  rules:
    - backendRefs:
        - name: xui-sub
          port: 2096
