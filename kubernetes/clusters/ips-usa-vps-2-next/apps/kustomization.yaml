---
# Capability selection — apps layer. vpn-stack bundle (bases + sub route + gost cert) +
# per-cluster gost SOPS secret. 3x-ui has no per-cluster overlay (fully in the bundle).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../apps/bundles/vpn-stack
  - gost
