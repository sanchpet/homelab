---
# Per-cluster variables: subdomain + ALL component versions for THIS cluster.
# Each layer Flux Kustomization substitutes from here (postBuild.substituteFrom).
# Never leave a version unset — Flux would float to latest (non-reproducible).
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars
  namespace: flux-system
data:
  cluster_subdomain: "vps-2.usa.ips.sanch.pet"
  acme_email: "ops@sanch.pet"
  gateway_sub_tls_secret: "sub-vps-2-tls"
  gateway_api_version: "v1.5.1"
  cert_manager_version: "v1.20.2"
  ngf_version: "2.6.3"
  reloader_version: "2.2.12"
