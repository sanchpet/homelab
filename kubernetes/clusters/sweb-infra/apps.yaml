---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/clusters/sweb-infra/apps
  prune: true
  wait: true
  # No decryption: like the Vault host, this cluster's apps get secrets via Vault/ESO, not
  # SOPS — so it must not depend on a sops-age key. (Vault + vaultwarden land here next.)
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
