---
# 3x-ui — Xray panel (VLESS/Reality etc). Userspace proxy: no TUN/privileged needed
# (unlike anylink). hostNetwork so configured inbounds bind the node's public ports
# directly. Persistence via PVC (local-path) for the config DB and certs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 3x-ui
  namespace: vpn
  labels:
    app: 3x-ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: 3x-ui
  template:
    metadata:
      labels:
        app: 3x-ui
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: 3x-ui
          image: ghcr.io/mhsanaei/3x-ui:v3.3.1
          env:
            - name: XUI_ENABLE_FAIL2BAN
              value: "true"
          volumeMounts:
            - name: db
              mountPath: /etc/x-ui
            - name: cert
              mountPath: /root/cert
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: 3x-ui-db
        - name: cert
          persistentVolumeClaim:
            claimName: 3x-ui-cert
