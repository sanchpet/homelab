---
# 3x-ui — Xray panel (VLESS/Reality etc). Userspace proxy: no TUN/privileged needed.
# Pod network (NOT hostNetwork): only the Reality inbound (443) is published to the
# host via hostPort. The panel (2053) stays on the pod network → not publicly exposed;
# reach it via the ClusterIP service (svc/xui-panel) with kubectl port-forward (VPN
# on) or an SSH tunnel to the service IP (VPN off). Persistence via PVC (local-path).
# Note: hostPort uses the portmap CNI plugin; client source IP may be SNAT'd to the
# node IP (fine for Reality). New inbound ports must be added here as hostPorts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 3x-ui
  namespace: vpn
  labels:
    app: 3x-ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: 3x-ui
  template:
    metadata:
      labels:
        app: 3x-ui
    spec:
      containers:
        - name: 3x-ui
          image: ghcr.io/mhsanaei/3x-ui:v3.3.1
          ports:
            - name: reality
              containerPort: 443
              hostPort: 443          # published to the node (public) — the VPN inbound
            - name: panel
              containerPort: 2053     # pod-network only (no hostPort) — not public
          env:
            - name: XUI_ENABLE_FAIL2BAN
              value: "true"
          volumeMounts:
            - name: db
              mountPath: /etc/x-ui
            - name: cert
              mountPath: /root/cert
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: 3x-ui-db
        - name: cert
          persistentVolumeClaim:
            claimName: 3x-ui-cert
