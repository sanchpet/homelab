---
# Read-only RBAC for the k8s incident agent (R-014 learning sandbox) is authored ONCE
# in the public learning-monorepo and pulled in declaratively — same external-source
# pattern as crds/gateway-api (no vendored copy in this repo).
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: learning-monorepo
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/sanchpet/learning-monorepo.git   # public repo → no secretRef
  ref:
    # Tracking `main` is intentional: this is our own repo and a low-blast-radius
    # read-only sandbox — exactly how flux-system tracks its own branch. ADR-0001's
    # "never float a version" is about chart/CRD versions, not a config repo's branch.
    branch: main
  # The whole repo is small; the Kustomization below selects the RBAC subpath.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: incident-agent-rbac
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true          # delete the RBAC if this Kustomization is removed
  wait: true           # RBAC objects are Ready immediately (no health probes)
  sourceRef:
    kind: GitRepository
    name: learning-monorepo
  path: ./courses/r-014-slurm-ai-agents/02-sdk-incident-agent/k8s/rbac
