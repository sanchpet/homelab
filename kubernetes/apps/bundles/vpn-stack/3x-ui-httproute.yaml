---
# Routes the sub hostname (TLS-terminated at the Gateway :8443) to the 3x-ui sub server.
# Shared across VPN nodes; host parameterized via ${cluster_subdomain}.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: xui-sub
  namespace: vpn
spec:
  parentRefs:
    - name: main
      namespace: nginx-gateway
      sectionName: sub-https
  hostnames:
    - sub.${cluster_subdomain}
  rules:
    - backendRefs:
        - name: xui-sub
          port: 2096
