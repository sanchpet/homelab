---
# Bundle `vpn-stack` — the VPN capability: 3x-ui (Xray panel), gost (TLS-wrapped proxy).
# Selected by VPN-node clusters; the Vault host omits it. Non-overlapping with any bundle.
# anylink (OpenConnect) decommissioned 2026-06-27 — poor throughput from RU, test only.
# Its removal is confirmed at cutover: the new layout omits it, prune deletes the running
# instance. Old apps/base/anylink stays until both clusters cut over (old tree needs it).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/3x-ui
  - ../../base/gost
