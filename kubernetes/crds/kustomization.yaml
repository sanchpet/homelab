---
# Catalog — CRD groups, hoisted, installed + waited on before controllers/config so kinds
# (Gateway, HTTPRoute, Certificate, …) exist before anything references them.
# gateway-api: git source pinned via ${gateway_api_version}.
# cert-manager: kustomize remote resource (release asset URL, version in the URL).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gateway-api
  - cert-manager
