---
# Shared VPN-node gateway (NGF). HTTP:80 for ACME HTTP-01 + HTTPS:8443 for the sub
# endpoint. xray Reality keeps hostPort 443 — different ports, no conflict.
# Identical across VPN nodes: host via ${cluster_subdomain}, TLS secret via
# ${gateway_sub_tls_secret} (kept = each cluster's existing secret → zero cert churn).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: sub-https
      port: 8443
      protocol: HTTPS
      hostname: sub.${cluster_subdomain}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: ${gateway_sub_tls_secret}
      allowedRoutes:
        namespaces:
          from: All
