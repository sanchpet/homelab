---
# Bundle `vpn-gateway` — the shared VPN-node gateway + its sub TLS cert, parameterized
# per cluster via ${cluster_subdomain} / ${gateway_sub_tls_secret}. Selected in the
# config layer by VPN nodes. The Vault host keeps its own gateway (vault-https:443).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gateway.yaml
  - certificate.yaml
