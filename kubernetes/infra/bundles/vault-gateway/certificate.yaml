---
# Vault endpoint TLS cert. Certificate object name is stable (vault-tls); secretName via
# ${gateway_vault_tls_secret} (matches the Gateway's certificateRef).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: nginx-gateway
spec:
  secretName: ${gateway_vault_tls_secret}
  dnsNames:
    - vault.${cluster_subdomain}
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
