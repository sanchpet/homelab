---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: "${cert_manager_version}"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # CRDs are hoisted to crds/cert-manager (remote resource, installed by the infra-crds
    # layer before this controller). The chart must NOT manage them → enabled:false.
    crds:
      enabled: false
    # Enable the Gateway API HTTP-01 solver (gatewayHTTPRoute) used by the ClusterIssuer.
    config:
      apiVersion: controller.config.cert-manager.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true
