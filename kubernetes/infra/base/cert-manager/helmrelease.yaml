---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: cert-manager
      version: "${cert_manager_version}"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # TODO(WP-050 cutover): hoist CRDs to crds/cert-manager and flip enabled:false.
    # Ownership handoff Helm→Flux is delicate — done per-cluster under `flux reconcile`,
    # not in the additive catalog step.
    crds:
      enabled: true
      keep: true
    # Enable the Gateway API HTTP-01 solver (gatewayHTTPRoute) used by the ClusterIssuer.
    config:
      apiVersion: controller.config.cert-manager.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true
