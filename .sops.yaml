# SOPS creation rules. Encrypt any *.sops.yaml under kubernetes/ with the cluster age key.
# Private key lives only as the `sops-age` Secret in flux-system (created out-of-band on
# the node) and in the owner's password manager — never in Git.
creation_rules:
  - path_regex: kubernetes/.*\.sops\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    age: age1ayd37q6cyqrh2d2jgz04jx0guxmj483d0tchhqd6sd83ukcf4vusm4p63q
  # terraform/ VPN client lists (3x-ui). The client identities are PII — encrypt them. The
  # map keys (local labels) stay readable for diff review, so use codenames there, not names.
  # More specific than the generic terraform rule below, so it must come first.
  - path_regex: terraform/.*/clients\.sops\.ya?ml$
    encrypted_regex: ^(email|comment|tg_id|sub_id|password|auth)$
    age: age1ayd37q6cyqrh2d2jgz04jx0guxmj483d0tchhqd6sd83ukcf4vusm4p63q
  # terraform/ panel credentials (3x-ui admin user/pass + webBasePath). Plain YAML keys,
  # so encrypt the values by key name. Same age key (private key in the owner's pw manager).
  - path_regex: terraform/.*\.sops\.ya?ml$
    encrypted_regex: ^(base_path|username|password|bootstrap_username|bootstrap_password)$
    age: age1ayd37q6cyqrh2d2jgz04jx0guxmj483d0tchhqd6sd83ukcf4vusm4p63q
