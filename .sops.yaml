# SOPS creation rules. Encrypt any *.sops.yaml under kubernetes/ with the cluster age key.
# Private key lives only as the `sops-age` Secret in flux-system (created out-of-band on
# the node) and in the owner's password manager — never in Git.
creation_rules:
  - path_regex: kubernetes/.*\.sops\.ya?ml$
    encrypted_regex: ^(data|stringData)$
    age: age1ayd37q6cyqrh2d2jgz04jx0guxmj483d0tchhqd6sd83ukcf4vusm4p63q
