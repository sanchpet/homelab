name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install ansible-core ansible-lint
      - name: Install collections
        working-directory: ansible
        run: ansible-galaxy collection install -r requirements.yml
      - name: Lint Ansible
        working-directory: ansible
        run: ansible-lint

  sops-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure *.sops.yaml secret files are encrypted
        run: |
          files=$(git ls-files '*.sops.yaml' || true)
          status=0
          for f in $files; do
            # Skip the SOPS config itself (.sops.yaml = creation rules, not a secret).
            [ "$(basename "$f")" = ".sops.yaml" ] && continue
            if ! grep -q '^sops:' "$f"; then
              echo "::error file=$f::Unencrypted SOPS file committed"
              status=1
            fi
          done
          [ "$status" -eq 0 ] && echo "OK: no plaintext SOPS files"
          exit $status

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate manifests (placeholder)
        run: |
          # TODO: wire up kubeconform once kubernetes/ has manifests
          echo "kubeconform will validate manifests as they are added"
